<!DOCTYPE html>
<html>
<head>
    <title>Student CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>CGPA Calculator</h1>

    <div class="subject">
        <input type="number" id="s1" placeholder="Subject 1 GPA">
        <input type="number" id="s2" placeholder="Subject 2 GPA">
        <input type="number" id="s3" placeholder="Subject 3 GPA">
        <input type="number" id="s4" placeholder="Subject 4 GPA">
        <input type="number" id="s5" placeholder="Subject 5 GPA">
    </div>

    <button onclick="calculateCGPA()">Calculate CGPA</button>

    <h2 id="result"></h2>
</div>

<script src="script.js"></script>

</body>
</html>
